<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OOP Quiz — 25 Questions</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7fafc;
        padding: 20px;
        color: #222;
      }
      .quiz-container {
        max-width: 950px;
        margin: 0 auto;
        background: #fff;
        padding: 22px;
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      }
      h2 {
        margin-top: 0;
        color: #1f2937;
      }
      .user-info {
        margin-bottom: 20px;
        padding: 15px;
        background: #f9fafb;
        border-radius: 10px;
      }
      .user-info label {
        display: block;
        margin: 8px 0 4px;
        font-weight: 600;
      }
      .user-info input {
        width: 100%;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }
      .question {
        margin: 16px 0;
      }
      .question p {
        margin: 0 0 8px 0;
        font-weight: 600;
      }
      .options label {
        display: block;
        padding: 8px 10px;
        margin: 6px 0;
        background: #f3f4f6;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
      }
      .options input {
        margin-right: 8px;
      }
      .controls {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        padding: 10px 16px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      #submitBtn {
        background: #2563eb;
        color: white;
      }
      #resetBtn {
        background: #e5e7eb;
        color: #111;
      }
      #downloadBtn {
        background: #059669;
        color: white;
        display: none;
      }
      #report {
        margin-top: 22px;
        padding: 16px;
        border-radius: 10px;
        display: none;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
      }
      .correct {
        color: #166534;
        font-weight: 600;
      }
      .wrong {
        color: #b91c1c;
        font-weight: 600;
      }
      ol {
        padding-left: 18px;
        margin: 10px 0;
      }
      .small {
        font-size: 0.95rem;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <h2>OOP Quiz — 25 Questions</h2>

      <!-- User Info -->
      <div class="user-info">
        <label for="name">Name:</label>
        <input type="text" id="name" required />
        <label for="email">Email:</label>
        <input type="email" id="email" required />
        <label for="regno">Register Number:</label>
        <input type="text" id="regno" required />
      </div>

      <form id="quizForm"></form>

      <div class="controls">
        <button type="button" id="submitBtn">Submit Quiz</button>
        <button type="button" id="resetBtn">Reset / Retake</button>
        <button type="button" id="downloadBtn">Download PDF Report</button>
      </div>

      <div id="report" class="small"></div>
    </div>

    <!-- jsPDF library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
      (function () {
        // All questions + options + correct answer
        const questions = [
          {
            q: "Which of the following is NOT a principle of OOP?",
            opts: [
              "Encapsulation",
              "Polymorphism",
              "Abstraction",
              "Compilation",
            ],
            ans: "d",
          },
          {
            q: "Which feature of OOP indicates code reusability?",
            opts: [
              "Encapsulation",
              "Inheritance",
              "Polymorphism",
              "Abstraction",
            ],
            ans: "b",
          },
          {
            q: "Which OOP concept binds data and functions together?",
            opts: [
              "Encapsulation",
              "Inheritance",
              "Polymorphism",
              "Overloading",
            ],
            ans: "a",
          },
          {
            q: "Which allows multiple functions with the same name but different parameters?",
            opts: ["Overriding", "Overloading", "Abstraction", "Inheritance"],
            ans: "b",
          },
          {
            q: "Which statement best describes polymorphism?",
            opts: [
              "One interface, many implementations",
              "Hiding internal details",
              "Binding data and methods",
              "Reusing code",
            ],
            ans: "a",
          },
          {
            q: "Which keyword is used to inherit a class in Java?",
            opts: ["implements", "extends", "inherits", "super"],
            ans: "b",
          },
          {
            q: "Which is commonly achieved using interfaces?",
            opts: [
              "Multiple inheritance",
              "Encapsulation",
              "Memory management",
              "Constructor chaining",
            ],
            ans: "a",
          },
          {
            q: "Which is NOT primarily an OOP language?",
            opts: ["Java", "Python", "C", "C++"],
            ans: "c",
          },
          {
            q: "Constructor overloading is an example of which polymorphism?",
            opts: ["Runtime", "Compile-time", "Ad-hoc", "Parametric"],
            ans: "b",
          },
          {
            q: "Which OOP concept is represented by a 'has-a' relationship?",
            opts: ["Composition", "Inheritance", "Polymorphism", "Abstraction"],
            ans: "a",
          },
          {
            q: "Which concept means hiding internal details?",
            opts: [
              "Encapsulation",
              "Inheritance",
              "Abstraction",
              "Polymorphism",
            ],
            ans: "c",
          },
          {
            q: "Which principle restricts direct access to components?",
            opts: [
              "Abstraction",
              "Polymorphism",
              "Encapsulation",
              "Inheritance",
            ],
            ans: "c",
          },
          {
            q: "Which method is called when an object is created?",
            opts: ["finalize()", "Constructor", "main()", "static()"],
            ans: "b",
          },
          {
            q: "Which allows a subclass to provide specific implementation?",
            opts: ["Overriding", "Overloading", "Encapsulation", "Abstraction"],
            ans: "a",
          },
          {
            q: "Which access specifier allows access only in the same class?",
            opts: ["public", "protected", "private", "default"],
            ans: "c",
          },
          {
            q: "Which supports runtime polymorphism?",
            opts: [
              "Overloading",
              "Overriding",
              "Constructor overloading",
              "Static methods",
            ],
            ans: "b",
          },
          {
            q: "Which cannot be overridden in Java?",
            opts: [
              "static methods",
              "instance methods",
              "abstract methods",
              "inherited methods",
            ],
            ans: "a",
          },
          {
            q: "Which relationship is shown by 'is-a'?",
            opts: ["Composition", "Aggregation", "Inheritance", "Association"],
            ans: "c",
          },
          {
            q: "Which is true about abstract classes?",
            opts: [
              "Cannot have constructors",
              "Cannot have methods",
              "Cannot be subclassed",
              "Cannot be instantiated",
            ],
            ans: "d",
          },
          {
            q: "Which keyword refers to parent class object?",
            opts: ["this", "super", "parent", "base"],
            ans: "b",
          },
          {
            q: "Which is true about interfaces in Java?",
            opts: [
              "They can have constructors",
              "They can contain only private methods",
              "They can be implemented by multiple classes",
              "They cannot have static methods",
            ],
            ans: "c",
          },
          {
            q: "Which is NOT allowed in OOP?",
            opts: [
              "Multiple inheritance with classes in Java",
              "Multiple interfaces",
              "Abstract classes",
              "Overriding",
            ],
            ans: "a",
          },
          {
            q: "Which is NOT a feature of OOP?",
            opts: [
              "Abstraction",
              "Inheritance",
              "Polymorphism",
              "Structured programming",
            ],
            ans: "d",
          },
          {
            q: "Which keyword prevents inheritance of a class?",
            opts: ["super", "final", "private", "abstract"],
            ans: "b",
          },
          {
            q: "Which is true about method overloading?",
            opts: [
              "Occurs at runtime",
              "Return type must differ",
              "Parameter list must differ",
              "Method name must differ",
            ],
            ans: "c",
          },
        ];

        const quizForm = document.getElementById("quizForm");
        const report = document.getElementById("report");
        const submitBtn = document.getElementById("submitBtn");
        const resetBtn = document.getElementById("resetBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        let finalReportText = "";

        // Render all questions
        questions.forEach((q, i) => {
          const qDiv = document.createElement("div");
          qDiv.classList.add("question");
          qDiv.innerHTML = `<p>${i + 1}. ${q.q}</p>`;
          const optsDiv = document.createElement("div");
          optsDiv.classList.add("options");
          ["a", "b", "c", "d"].forEach((letter, idx) => {
            optsDiv.innerHTML += `
            <label>
              <input type="radio" name="q${i + 1}" value="${letter}">
              ${q.opts[idx]}
            </label>`;
          });
          qDiv.appendChild(optsDiv);
          quizForm.appendChild(qDiv);
        });

        submitBtn.addEventListener("click", function () {
          const name = document.getElementById("name").value.trim();
          const email = document.getElementById("email").value.trim();
          const regno = document.getElementById("regno").value.trim();

          if (!name || !email || !regno) {
            alert(
              "Please fill in your Name, Email, and Register Number before submitting."
            );
            return;
          }

          let score = 0;
          let total = questions.length;
          let resultHTML = `<h3>Quiz Report</h3>
          <p><strong>Name:</strong> ${name}<br>
          <strong>Email:</strong> ${email}<br>
          <strong>Register Number:</strong> ${regno}</p><ol>`;

          finalReportText = `OOP Quiz Report\n\nName: ${name}\nEmail: ${email}\nRegister Number: ${regno}\n\n`;

          questions.forEach((q, i) => {
            const qNum = i + 1;
            const selected = quizForm[`q${qNum}`]?.value || "";
            if (selected === q.ans) {
              score++;
              resultHTML += `<li class="correct">${q.q} — Correct</li>`;
              finalReportText += `Q${qNum}. ${q.q}\nAnswer: Correct\n\n`;
            } else {
              const correctText = q.opts[["a", "b", "c", "d"].indexOf(q.ans)];
              resultHTML += `<li class="wrong">${q.q} — Wrong (Correct: ${correctText})</li>`;
              finalReportText += `Q${qNum}. ${q.q}\nAnswer: Wrong (Correct: ${correctText})\n\n`;
            }
          });

          resultHTML += `</ol><p><strong>Final Score: ${score} / ${total}</strong></p>`;
          finalReportText += `Final Score: ${score} / ${total}`;

          report.innerHTML = resultHTML;
          report.style.display = "block";
          downloadBtn.style.display = "inline-block";
        });

        resetBtn.addEventListener("click", function () {
          quizForm.reset();
          report.style.display = "none";
          downloadBtn.style.display = "none";
        });

        downloadBtn.addEventListener("click", function () {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          const lines = finalReportText.split("\n");
          let y = 10;
          doc.setFont("helvetica", "normal");
          doc.setFontSize(11);
          lines.forEach((line) => {
            doc.text(line, 10, y);
            y += 7;
            if (y > 280) {
              doc.addPage();
              y = 10;
            }
          });
          doc.save("OOP_Quiz_Report.pdf");
        });
      })();
    </script>
  </body>
</html>
